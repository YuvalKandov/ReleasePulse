{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "releasepulse.postgresHost" . }}
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  # serviceName ties the StatefulSet to its headless Service for stable DNS.
  serviceName: {{ include "releasepulse.postgresHost" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "releasepulse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "releasepulse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image | quote }}
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "releasepulse.dbSecretName" . }}
                  key: POSTGRES_PASSWORD
            # Keep data in a subdirectory so a fresh PVC's lost+found can't block
            # initdb (a classic gotcha when mounting straight at the data dir).
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          # pg_isready is the right probe: it reports true only once Postgres is
          # actually accepting connections, not merely that the process exists.
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.user | quote }}, "-d", {{ .Values.postgres.database | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  # volumeClaimTemplates is the StatefulSet-only feature: it provisions a private,
  # durable PVC per replica that survives pod restarts. On kind this is satisfied
  # by the default local-path StorageClass.
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage | quote }}
{{- end }}
