{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "releasepulse.fullname" . }}-grafana
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "releasepulse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      annotations:
        # Roll Grafana when its provisioning/dashboards ConfigMap changes, so new
        # datasources and dashboards are picked up on helm upgrade.
        checksum/config: {{ include (print $.Template.BasePath "/grafana-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "releasepulse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image | quote }}
          ports:
            - name: http
              containerPort: 3000
          env:
            # Anonymous viewing for the local demo - no login to see the dashboard.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            # Expanded into the datasource provisioning file at startup.
            - name: GRAFANA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "releasepulse.dbSecretName" . }}
                  key: GRAFANA_DB_PASSWORD
          # subPath places each ConfigMap key as a single file in the directory
          # Grafana expects, without taking over the whole directory.
          volumeMounts:
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: grafana-config
              mountPath: /var/lib/grafana/dashboards/service-health.json
              subPath: service-health.json
            {{- if .Values.prometheus.enabled }}
            - name: grafana-config
              mountPath: /var/lib/grafana/dashboards/platform-health.json
              subPath: platform-health.json
            {{- end }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: grafana-config
          configMap:
            name: {{ include "releasepulse.fullname" . }}-grafana
{{- end }}
