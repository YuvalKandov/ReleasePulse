{{- if and .Values.postgres.enabled .Values.grafana.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "releasepulse.fullname" . }}-db-provision
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-provision
  annotations:
    # Wave 2: after migrate (wave 1), so the tables the views read exist.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "releasepulse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: db-provision
    spec:
      restartPolicy: OnFailure
      {{- if .Values.postgres.enabled }}
      initContainers:
        # Wait for the schema (not just Postgres): the views read app tables that
        # migrate creates, so db-provision must run after migrate either way.
        {{- include "releasepulse.waitForMigrations" . | nindent 8 }}
      {{- end }}
      containers:
        - name: db-provision
          image: {{ .Values.postgres.image | quote }}
          # Apply views, then the role/grants. -v passes the Grafana password from
          # the Secret as the psql variable the grants script reads.
          command:
            - sh
            - -c
            - >
              psql -v ON_ERROR_STOP=1 -v grafana_password="$GRAFANA_DB_PASSWORD"
              -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE"
              -f /sql/views.sql -f /sql/grants.sql
          env:
            - name: PGHOST
              value: {{ include "releasepulse.postgresHost" . }}
            - name: PGUSER
              value: {{ .Values.postgres.user | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "releasepulse.dbSecretName" . }}
                  key: POSTGRES_PASSWORD
            - name: GRAFANA_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "releasepulse.dbSecretName" . }}
                  key: GRAFANA_DB_PASSWORD
          volumeMounts:
            - name: sql
              mountPath: /sql
      volumes:
        - name: sql
          configMap:
            name: {{ include "releasepulse.fullname" . }}-db-provision-sql
{{- end }}
