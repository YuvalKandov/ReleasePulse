{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "releasepulse.dbSecretName" . }}
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
type: Opaque
# Database-side credentials, kept separate from the app secret so the api/worker
# never receive them: POSTGRES_PASSWORD is consumed by the Postgres container, and
# GRAFANA_DB_PASSWORD by the read-only role + Grafana's datasource.
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  GRAFANA_DB_PASSWORD: {{ .Values.grafana.roPassword | quote }}
{{- end }}
