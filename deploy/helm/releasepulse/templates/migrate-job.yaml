apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "releasepulse.fullname" . }}-migrate
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # ArgoCD Sync hook, ordered by sync-wave: runs in wave 1, after Postgres
    # (wave 0) is healthy and before the app (wave 3). BeforeHookCreation deletes
    # the prior Job each sync so migrations re-run on every deploy.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "releasepulse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- if .Values.postgres.enabled }}
      initContainers:
        {{- include "releasepulse.waitForPostgres" . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            # The image's USER is the name "app"; the kubelet can't verify a name
            # is non-root, so give it the numeric uid (matches useradd in Dockerfile).
            runAsUser: 1000
          command: ["alembic", "upgrade", "head"]
          # DATABASE_URL comes from the app Secret; the ConfigMap rides along
          # harmlessly. alembic's env.py reads DATABASE_URL straight from the env.
          envFrom:
            - configMapRef:
                name: {{ include "releasepulse.configName" . }}
            - secretRef:
                name: {{ include "releasepulse.appSecretName" . }}
