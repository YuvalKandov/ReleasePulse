apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "releasepulse.fullname" . }}-migrate
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    # Helm hook: run AFTER the release's resources (so Postgres exists), on both
    # install and every upgrade. Weight 0 orders it before db-provision (weight 10);
    # Helm waits for this Job to succeed before the next hook runs.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    # Keep the finished Job for log inspection; delete it just before the next run.
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "releasepulse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- if .Values.postgres.enabled }}
      initContainers:
        {{- include "releasepulse.waitForPostgres" . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            # The image's USER is the name "app"; the kubelet can't verify a name
            # is non-root, so give it the numeric uid (matches useradd in Dockerfile).
            runAsUser: 1000
          command: ["alembic", "upgrade", "head"]
          # DATABASE_URL comes from the app Secret; the ConfigMap rides along
          # harmlessly. alembic's env.py reads DATABASE_URL straight from the env.
          envFrom:
            - configMapRef:
                name: {{ include "releasepulse.configName" . }}
            - secretRef:
                name: {{ include "releasepulse.appSecretName" . }}
