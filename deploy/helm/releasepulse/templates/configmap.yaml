apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "releasepulse.configName" . }}
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
data:
  # Plain (non-secret) application settings. api/worker load these as env via
  # envFrom, so the key names must match the pydantic Settings env var names.
  APP_ENV: {{ .Values.config.appEnv | quote }}
  {{- $allow := .Values.config.ssrfAllowlist }}
  {{- if .Values.demo.enabled }}
  {{- /* The demo resolves to a private ClusterIP, so dev-mode SSRF must allowlist
         its hostname. The name is release-dependent, so compute it here. */}}
  {{- $allow = printf "%s,%s-demo" $allow (include "releasepulse.fullname" .) | trimPrefix "," }}
  {{- end }}
  SSRF_ALLOWLIST: {{ $allow | quote }}
  WORKER_HTTP_PORT: {{ .Values.config.workerHttpPort | quote }}
  DETECTOR_BASELINE_SEC: {{ .Values.config.detector.baselineSec | quote }}
  DETECTOR_WARMUP_SEC: {{ .Values.config.detector.warmupSec | quote }}
  DETECTOR_OBSERVATION_SEC: {{ .Values.config.detector.observationSec | quote }}
  DETECTOR_MIN_SAMPLES: {{ .Values.config.detector.minSamples | quote }}
  DETECTOR_MIN_SUCCESSFUL_BASELINE: {{ .Values.config.detector.minSuccessfulBaseline | quote }}
