apiVersion: v1
kind: Secret
metadata:
  name: {{ include "releasepulse.appSecretName" . }}
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
type: Opaque
# stringData lets us write plain values; Kubernetes base64-encodes them on apply.
# The api and worker load these as env via envFrom (key names match Settings).
stringData:
  ADMIN_TOKEN: {{ .Values.secrets.adminToken | quote }}
  WEBHOOK_SECRET: {{ .Values.secrets.webhookSecret | quote }}
  DATABASE_URL: {{ include "releasepulse.databaseUrl" . | quote }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | quote }}
  TELEGRAM_CHAT_ID: {{ .Values.secrets.telegramChatId | quote }}
