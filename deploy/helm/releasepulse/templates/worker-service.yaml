apiVersion: v1
kind: Service
metadata:
  name: {{ include "releasepulse.fullname" . }}-worker
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  # The worker has no public API; this Service exists so Prometheus can scrape its
  # /metrics (and /readyz is reachable in-cluster). Not for end-user traffic.
  type: ClusterIP
  selector:
    {{- include "releasepulse.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  ports:
    - name: http
      port: {{ .Values.config.workerHttpPort }}
      targetPort: http
