{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "releasepulse.minioSecretName" . }}
  labels:
    {{- include "releasepulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
type: Opaque
# Object-store root credentials. The backup CronJob reads these to authenticate
# `mc`; nothing else in the stack touches them. Override in any real deploy.
stringData:
  MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.rootPassword | quote }}
{{- end }}
